<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Фон — скруглённый квадрат -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#3584e4"/>

  <!-- Ножницы — два лезвия -->
  <g stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none">
    <!-- Левое лезвие -->
    <line x1="38" y1="90" x2="72" y2="42"/>
    <!-- Правое лезвие -->
    <line x1="90" y1="90" x2="72" y2="42"/>
  </g>

  <!-- Кольца ножниц -->
  <circle cx="34" cy="96" r="10" fill="none" stroke="#fff" stroke-width="4"/>
  <circle cx="94" cy="96" r="10" fill="none" stroke="#fff" stroke-width="4"/>

  <!-- Пунктирная линия обрезки -->
  <line x1="20" y1="42" x2="108" y2="42" stroke="#fff" stroke-width="3" stroke-dasharray="8,6" opacity="0.7"/>
</svg>
